<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0a2463"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1e3d"/>
      <stop offset="100%" stop-color="#0d2b5e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield shape -->
  <path d="M128 16 L224 56 L224 120 C224 176 182 224 128 244 C74 224 32 176 32 120 L32 56 Z"
        fill="url(#innerGlow)" stroke="url(#shieldGrad)" stroke-width="5"/>

  <!-- Neural network nodes (glowing cyan dots) -->
  <g filter="url(#glow)">
    <!-- Central node -->
    <circle cx="128" cy="120" r="10" fill="#00e5ff"/>
    <!-- Top nodes -->
    <circle cx="128" cy="68" r="7" fill="#00e5ff"/>
    <circle cx="96" cy="82" r="6" fill="#00bcd4"/>
    <circle cx="160" cy="82" r="6" fill="#00bcd4"/>
    <!-- Middle nodes -->
    <circle cx="80" cy="120" r="7" fill="#00e5ff"/>
    <circle cx="176" cy="120" r="7" fill="#00e5ff"/>
    <!-- Bottom nodes -->
    <circle cx="96" cy="160" r="6" fill="#00bcd4"/>
    <circle cx="160" cy="160" r="6" fill="#00bcd4"/>
    <circle cx="128" cy="180" r="7" fill="#00e5ff"/>
    <!-- Extra detail nodes -->
    <circle cx="108" cy="100" r="4" fill="#4dd0e1"/>
    <circle cx="148" cy="100" r="4" fill="#4dd0e1"/>
    <circle cx="108" cy="144" r="4" fill="#4dd0e1"/>
    <circle cx="148" cy="144" r="4" fill="#4dd0e1"/>
  </g>

  <!-- Neural connections (thin glowing lines) -->
  <g stroke="#00e5ff" stroke-width="1.5" opacity="0.7" filter="url(#glow)">
    <!-- From center to all -->
    <line x1="128" y1="120" x2="128" y2="68"/>
    <line x1="128" y1="120" x2="80" y2="120"/>
    <line x1="128" y1="120" x2="176" y2="120"/>
    <line x1="128" y1="120" x2="128" y2="180"/>
    <line x1="128" y1="120" x2="96" y2="82"/>
    <line x1="128" y1="120" x2="160" y2="82"/>
    <line x1="128" y1="120" x2="96" y2="160"/>
    <line x1="128" y1="120" x2="160" y2="160"/>
    <!-- Cross connections -->
    <line x1="96" y1="82" x2="80" y2="120"/>
    <line x1="160" y1="82" x2="176" y2="120"/>
    <line x1="80" y1="120" x2="96" y2="160"/>
    <line x1="176" y1="120" x2="160" y2="160"/>
    <line x1="96" y1="160" x2="128" y2="180"/>
    <line x1="160" y1="160" x2="128" y2="180"/>
    <line x1="128" y1="68" x2="96" y2="82"/>
    <line x1="128" y1="68" x2="160" y2="82"/>
    <!-- Inner detail connections -->
    <line x1="108" y1="100" x2="148" y2="100" stroke-width="1" opacity="0.5"/>
    <line x1="108" y1="144" x2="148" y2="144" stroke-width="1" opacity="0.5"/>
    <line x1="108" y1="100" x2="108" y2="144" stroke-width="1" opacity="0.5"/>
    <line x1="148" y1="100" x2="148" y2="144" stroke-width="1" opacity="0.5"/>
  </g>
</svg>